<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Happy AI Path</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #f8f5ef;
      --card: #ffffff;
      --ink: #171717;
      --muted: #57534e;
      --accent: #0d9488;
      --accent-dark: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(13, 148, 136, 0.12), transparent 35%),
        linear-gradient(180deg, #fcfbf8 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      width: min(100%, 42rem);
      background: var(--card);
      border-radius: 1.5rem;
      padding: 3rem;
      box-shadow: 0 24px 60px rgba(13, 27, 47, 0.08);
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 1rem 0 0;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 1rem auto 0;
      max-width: 32rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.9rem 1.4rem;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      background: var(--accent-dark);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404</p>
    <h1>This page is not available.</h1>
    <p>The content you were looking for is not published right now. You can return to the main site from here.</p>
    <a href="/">Back to Home</a>
  </main>
</body>
</html>
